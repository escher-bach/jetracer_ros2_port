bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: odom
    bt_loop_duration: 50   # 20Hz instead of default 100Hz to prevent CPU overload

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 5.0    # Reduced to 5Hz to prevent CPU overload ("Control loop missed its desired rate")
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 15.0   # Patient like ROS1's controller_patience: 15

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15       # Tightened based on 20cm robot length
      yaw_goal_tolerance: 0.5       # Match ROS 1 behavior (~28 degrees)

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.3
      lookahead_dist: 0.8            # Fixed lookahead distance for stable tracking
      min_lookahead_dist: 0.8        # Kept same as lookahead to prevent shrinking
      max_lookahead_dist: 0.8        # Kept same as lookahead to prevent shrinking
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.0   # Cannot rotate in place — Ackermann
      transform_tolerance: 0.5
      use_velocity_scaled_lookahead_dist: false # TURNED OFF to prevent jitter and sudden darting near goal
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6  # Increased to slow down earlier and prevent overshoot
                                           # the "slow crawl into tolerance zone then overshoot" issue
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.50   # CRITICAL: matches physical min turning radius!
                                                   # RPP will slow down when computed curvature
                                                   # implies a tighter radius than this
      regulated_linear_scaling_min_speed: 0.10
      allow_reversing: true
      max_angular_accel: 1.5         # Limit angular acceleration — prevents jerky steering
      use_rotate_to_heading: false   # Cannot rotate in place — Ackermann

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 2.0        # Reduced from 5.0 to save CPU
      publish_frequency: 1.0       # Reduced from 2.0 to save CPU
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: False
      rolling_window: true
      width: 5                     # Increased from 3 to give lookahead point room
      height: 5                    # Increased from 3 to give lookahead point room
      resolution: 0.05
      footprint: "[[-0.10, -0.08], [0.10, -0.08], [0.10, 0.08], [-0.10, 0.08]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.20
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 0.5        # Reduced from 1.0 to save CPU
      publish_frequency: 0.5       # Reduced from 1.0 to save CPU
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: False
      footprint: "[[-0.10, -0.08], [0.10, -0.08], [0.10, 0.08], [-0.10, 0.08]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.20
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 2.0  # Reduced from 20.0 to prevent global path jitter mid-path
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.25                  # Tightened from 0.5
      downsample_costmap: True
      downsampling_factor: 2
      allow_unknown: true
      max_iterations: 100000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "REEDS_SHEPP"
      minimum_turning_radius: 0.50     # Match robot's physical limit
      reverse_penalty: 2.1
      change_penalty: 0.20
      non_straight_penalty: 1.05
      cost_penalty: 1.3

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["wait", "spin", "backup"]
    wait:
      plugin: "nav2_behaviors/Wait"
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_timeout: 0.1
    use_sim_time: false
    simulate_ahead_time: 2.0
